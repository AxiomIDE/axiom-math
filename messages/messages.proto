syntax = "proto3";

package christian.axiom_math;

// A request to perform a binary arithmetic operation on two operands.
// `operation` selects the operator; `a` and `b` are the operands.
message MathRequest {
  // The operation to perform. One of:
  //   "add" · "subtract" · "multiply" · "divide" · "power" · "modulo"
  // Case-insensitive; common aliases (+, -, *, x, /, ^, %, mod) are also accepted.
  string operation = 1;
  // The left-hand operand.
  double a = 2;
  // The right-hand operand.
  double b = 3;
}

// The outcome of a MathRequest.
// On success `error` is empty and `value` holds the result.
// On failure (e.g. unknown operation or divide-by-zero) `error` describes the
// problem and `value` is 0.
message MathResult {
  // The numeric result of the operation (0 when `error` is set).
  double value = 1;
  // Empty on success; a human-readable message on failure.
  string error = 2;
  // Echo of the normalised operation that was applied (e.g. "divide").
  string operation = 3;
}
